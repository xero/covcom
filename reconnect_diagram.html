<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COVCOM — Reconnect Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:'Courier New',monospace;color:#c2c0b6;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh}
#title{font-size:13px;letter-spacing:.1em;color:#c2c0b6;text-align:center;margin-bottom:6px;opacity:.7}
#phase{font-size:11px;color:#c2c0b6;text-align:center;letter-spacing:.06em;min-height:16px;margin-bottom:10px;transition:opacity .1s}
canvas{display:block;max-width:100%}
#controls{display:flex;gap:8px;margin-top:10px}
button{background:none;border:0.5px solid #1c1c1e;color:#636158;font-family:inherit;font-size:10px;letter-spacing:.06em;padding:5px 14px;cursor:pointer;transition:border-color .15s,color .15s}
button:hover{border-color:#444;color:#c2c0b6}
#legend{display:flex;gap:18px;margin-top:10px;font-size:9px;color:#636158;letter-spacing:.04em;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>
<div id="title">COVCOM — session reconnect</div>
<div id="phase">—</div>
<canvas id="cv"></canvas>
<div id="controls">
  <button id="btn-pause">pause</button>
  <button id="btn-restart">restart</button>
</div>
<div id="legend">
  <span>⚙ large = ML-KEM epoch ratchet</span>
  <span>⚙ small = KDFChain (per-message)</span>
  <span>▬ link = message key, wiped after use</span>
  <span>● blob = Seal-encrypted relay</span>
</div>

<script>
const CV=document.getElementById('cv'),X=CV.getContext('2d');
CV.width=860;CV.height=345;
const PH=document.getElementById('phase');
const MO='"Courier New",monospace';
const c4=(hex,a)=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;};

const GY=102,KR=46,Kr=29,KT=16,CR=20,Cr=13,CT=9;
const SGY=GY+KR+CR+5;
const GGAP=CR*2+3;
const BDUR=1.4;

function gp(px){return{sx:px-GGAP/2,r0:px+GGAP/2,r1:px+GGAP*1.5};}

const COL={alice:'#1D9E75',bob:'#378ADD',charlie:'#EF9F27'};
const PEERS={
  alice:  {n:'alice',  col:COL.alice,  x:148,tx:148,epoch:0,out:0,sL:[],rL:{},ea:0,  sp:0,fl:0,vis:false},
  bob:    {n:'bob',    col:COL.bob,    x:430,tx:430,epoch:0,out:0,sL:[],rL:{},ea:1.1,sp:0,fl:0,vis:false},
  charlie:{n:'charlie',col:COL.charlie,x:712,tx:712,epoch:0,out:0,sL:[],rL:{},ea:2.2,sp:0,fl:0,vis:false},
};
let blobs=[],sparks=[],paused=false,lastT=null;
let gAlpha=1,fading=false,fadeT=0;
const FADE=0.55;

function sendMsg(f,t){
  const fp=PEERS[f];fp.out++;fp.sL.unshift({age:0});if(fp.sL.length>9)fp.sL.pop();
  const tp=PEERS[t];if(!tp.rL[f])tp.rL[f]=[];tp.rL[f].unshift({age:0});if(tp.rL[f].length>9)tp.rL[f].pop();
}
function triggerRatchet(n,delay=0){
  setTimeout(()=>{
    const p=PEERS[n];p.epoch++;p.out=0;p.sL=[];p.rL={};p.sp=1.4;p.fl=1;
    for(let i=0;i<28;i++){const a=Math.random()*Math.PI*2,s=50+Math.random()*110;sparks.push({x:p.x,y:GY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:p.col});}
  },delay*1000);
}
function spawnBlob(f,t,lbl,delay,onLand){
  setTimeout(()=>{
    blobs.push({fx:PEERS[f].x,fy:GY,tp:t,prog:0,lbl,col:PEERS[f].col,dur:BDUR});
    if(onLand)setTimeout(onLand,BDUR*1000);
  },delay*1000);
}

function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);
}
function drawGear(cx,cy,R,r,teeth,angle,fill,stroke,lw){
  const s=Math.PI*2/teeth;
  X.save();X.beginPath();
  for(let i=0;i<teeth;i++){
    const a=angle+i*s,h=s*.20,g=s*.30;
    [[r,a-g],[R,a-h],[R,a+h],[r,a+g]].forEach(([rad,ang],j)=>{
      const px=cx+Math.cos(ang)*rad,py=cy+Math.sin(ang)*rad;
      j===0&&i===0?X.moveTo(px,py):X.lineTo(px,py);
    });
  }
  X.closePath();X.fillStyle=fill;X.fill();X.strokeStyle=stroke;X.lineWidth=lw;X.stroke();X.restore();
}
function drawLinks(cx,col,links){
  if(!links||!links.length)return;
  const startY=SGY+CR+5,lh=10,lg=4,lw=17;
  for(let i=0;i<Math.min(links.length,9);i++){
    const y=startY+i*(lh+lg);if(y>338)break;
    const a=Math.max(0,(1-links[i].age/5)*(1-i*0.1));if(a<0.03)continue;
    X.save();X.globalAlpha=a;
    if(i>0){X.beginPath();X.moveTo(cx,y-lg);X.lineTo(cx,y);X.strokeStyle=c4(col,.22);X.lineWidth=0.7;X.stroke();}
    X.beginPath();roundRect(cx-lw/2,y,lw,lh,3);
    X.fillStyle=c4(col,.09);X.fill();X.strokeStyle=c4(col,.55);X.lineWidth=0.7;X.stroke();
    X.restore();
  }
}
function drawBlob(b){
  const t=b.prog;
  const tx=PEERS[b.tp].x,ty=GY;
  const tc=Math.min(t,1.0);
  const mx=(b.fx+tx)/2,my=Math.min(b.fy,ty)-65;
  const bx=(1-tc)*(1-tc)*b.fx+2*(1-tc)*tc*mx+tc*tc*tx;
  const by=(1-tc)*(1-tc)*b.fy+2*(1-tc)*tc*my+tc*tc*ty;
  const a=t<0.1?t/0.1:t>1.0?Math.max(0,(1.2-t)/0.2):1;
  if(a<=0)return;
  X.save();X.globalAlpha=a*.92;
  X.beginPath();X.arc(bx,by,14,0,Math.PI*2);X.fillStyle=c4(b.col,.1);X.fill();
  X.beginPath();X.arc(bx,by,4,0,Math.PI*2);X.fillStyle=b.col;X.fill();
  X.font=`8px ${MO}`;X.fillStyle=b.col;X.textAlign='center';
  b.lbl.split('\n').forEach((l,i)=>X.fillText(l,bx,by-18+i*10));
  X.restore();
}
function drawPeer(p){
  if(!p.vis)return;
  const x=Math.round(p.x),pos=gp(x),rKeys=Object.keys(p.rL);
  X.font=`bold 13px ${MO}`;X.fillStyle=p.col;X.textAlign='center';X.fillText(p.n,x,18);
  X.font=`10px ${MO}`;X.fillStyle='rgba(160,158,150,0.6)';
  X.fillText(`epoch: ${p.epoch}  ·  sent: ${p.out}`,x,31);
  drawGear(x,GY,KR,Kr,KT,p.ea,c4(p.col,0.05+p.fl*0.14),c4(p.col,0.22+p.fl*0.78),1.6);
  X.beginPath();X.arc(x,GY,11,0,Math.PI*2);
  X.fillStyle=c4(p.col,.07);X.fill();X.strokeStyle=c4(p.col,.3);X.lineWidth=1;X.stroke();
  X.font=`bold 9px ${MO}`;X.fillStyle=c4(p.col,.85+p.fl*.15);
  X.textAlign='center';X.textBaseline='middle';
  X.fillText('KEM',x,GY-4.5);X.fillText(`E${p.epoch}`,x,GY+4.5);
  X.textBaseline='alphabetic';
  drawGear(pos.sx,SGY,CR,Cr,CT,-p.ea*2.3,c4(p.col,.04+p.fl*.1),c4(p.col,.4+p.fl*.55),1);
  X.beginPath();X.arc(pos.sx,SGY,8,0,Math.PI*2);X.fillStyle=c4(p.col,.1);X.fill();
  X.font=`bold 6px ${MO}`;X.fillStyle='rgba(225,223,215,0.9)';
  X.textAlign='center';X.textBaseline='middle';X.fillText('send',pos.sx,SGY);X.textBaseline='alphabetic';
  drawLinks(pos.sx,p.col,p.sL);
  rKeys.forEach((fn,i)=>{
    const rx=i===0?pos.r0:pos.r1,rc=PEERS[fn]?.col??'#888';
    drawGear(rx,SGY,CR,Cr,CT,p.ea*2.3,c4(rc,.03),c4(rc,.32),1);
    X.beginPath();X.arc(rx,SGY,8,0,Math.PI*2);X.fillStyle=c4(rc,.08);X.fill();
    X.font=`bold 6px ${MO}`;X.fillStyle='rgba(225,223,215,0.9)';
    X.textAlign='center';X.textBaseline='middle';X.fillText('←'+fn.slice(0,3),rx,SGY);X.textBaseline='alphabetic';
    drawLinks(rx,rc,p.rL[fn]);
  });
  if(!rKeys.length){
    X.font=`8px ${MO}`;X.fillStyle='rgba(160,158,150,0.28)';X.textAlign='center';
    X.fillText('awaiting',pos.r0,SGY);
  }
}

const PHASES=[
  // start with 3-party already in progress at epoch 1
  {lbl:'3-party session in progress — alice epoch 1 · bob epoch 1 · charlie epoch 1',
   dur:4,nx:0,
   enter(){
    Object.values(PEERS).forEach(p=>{p.out=0;p.sL=[];p.rL={};p.sp=0;p.fl=0;p.vis=true;});
    PEERS.alice.epoch=1;  PEERS.alice.x=148;  PEERS.alice.tx=148;
    PEERS.bob.epoch=1;    PEERS.bob.x=430;    PEERS.bob.tx=430;
    PEERS.charlie.epoch=1;PEERS.charlie.x=712;PEERS.charlie.tx=712;
    PEERS.alice.rL={bob:[],charlie:[]};
    PEERS.bob.rL={alice:[],charlie:[]};
    PEERS.charlie.rL={alice:[],bob:[]};
    blobs=[];sparks=[];
    this.nx=.1;
   },
   update(dt){
    this.nx-=dt;
    if(this.nx<=0){
     this.nx=.18+Math.random()*.28;
     const all=['alice','bob','charlie'],from=all[Math.floor(Math.random()*3)],others=all.filter(n=>n!==from);
     PEERS[from].out++;PEERS[from].sL.unshift({age:0});if(PEERS[from].sL.length>9)PEERS[from].sL.pop();
     others.forEach(to=>{if(!PEERS[to].rL[from])PEERS[to].rL[from]=[];PEERS[to].rL[from].unshift({age:0});if(PEERS[to].rL[from].length>9)PEERS[to].rL[from].pop();});
    }
   }},

  // charlie disconnects — peer_left broadcast, alice and bob wipe his chains
  {lbl:'charlie disconnects — peer_left · alice and bob wipe charlie\'s chain state',
   dur:2.2,
   enter(){
    // charlie slides off right, alice and bob spread back to 2-party positions
    PEERS.charlie.tx=1100;
    PEERS.alice.tx=210;
    PEERS.bob.tx=650;
    setTimeout(()=>{
      delete PEERS.alice.rL.charlie;
      delete PEERS.bob.rL.charlie;
      PEERS.charlie.vis=false;
    },900);
   }},

  // alice and bob chat — charlie's keys are gone, his past messages are gone too
  {lbl:'alice and bob chat — charlie\'s keys wiped · past messages unrecoverable',
   dur:5,nx:0,
   enter(){this.nx=.1;},
   update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.28+Math.random()*.38;Math.random()<.5?sendMsg('alice','bob'):sendMsg('bob','alice');}}},

  // charlie returns — fresh session, epoch 0, brand new keypair
  // the name "charlie" happens to be free — but cryptographically he's a stranger
  {lbl:'charlie returns — fresh session · epoch 0 · new keypair · no memory of before',
   dur:2.2,
   enter(){
    PEERS.alice.tx=148;PEERS.bob.tx=430;
    PEERS.charlie.epoch=0;PEERS.charlie.out=0;PEERS.charlie.sL=[];PEERS.charlie.rL={};
    PEERS.charlie.x=1100;PEERS.charlie.tx=712;PEERS.charlie.vis=true;
   }},

  // alice and bob relay their current seeds — they're at epoch 1, charlie enters there
  {lbl:'relay — alice and bob send current epoch seeds · charlie enters at epoch 1',
   dur:3.2,
   enter(){
    spawnBlob('alice','charlie','Seal(ek\nepoch‖seed)',.25,()=>{PEERS.charlie.rL.alice=[];});
    spawnBlob('bob',  'charlie','Seal(ek\nepoch‖seed)',1.0, ()=>{PEERS.charlie.rL.bob=[];});
   }},

  // charlie fires welcome ratchet — same dance as before, epoch 0→1
  {lbl:'welcome ratchet — same dance as before · charlie epoch 0→1 · ratchet_step to all',
   dur:2.8,
   enter(){
    triggerRatchet('charlie',.45);
    const sd=0.65;
    spawnBlob('charlie','alice','ratchet_step\nkemCt+encSeed',sd,    ()=>{PEERS.alice.rL.charlie=[];});
    spawnBlob('charlie','bob',  'ratchet_step\nkemCt+encSeed',sd+.4, ()=>{PEERS.bob.rL.charlie=[];});
   }},

  // back to 3-party — charlie is in sync, but can't read anything from before he left
  {lbl:'3-party resumed — charlie is back · previous session messages still unrecoverable',
   dur:6,nx:0,
   enter(){this.nx=.1;},
   update(dt){
    this.nx-=dt;
    if(this.nx<=0){
     this.nx=.16+Math.random()*.26;
     const all=['alice','bob','charlie'],from=all[Math.floor(Math.random()*3)],others=all.filter(n=>n!==from);
     PEERS[from].out++;PEERS[from].sL.unshift({age:0});if(PEERS[from].sL.length>9)PEERS[from].sL.pop();
     others.forEach(to=>{if(!PEERS[to].rL[from])PEERS[to].rL[from]=[];PEERS[to].rL[from].unshift({age:0});if(PEERS[to].rL[from].length>9)PEERS[to].rL[from].pop();});
    }
   }},

  // alice rotates to close out clean
  {lbl:'alice rotates — session continues · forward secrecy holds across reconnect',
   dur:3.8,
   enter(){
    triggerRatchet('alice',.7);
    setTimeout(()=>{PEERS.alice.rL.bob=[];PEERS.alice.rL.charlie=[];},1400);
   }}
];

let phIdx=0,phT=0;
function resetToStart(){phIdx=0;phT=0;PH.textContent=PHASES[0].lbl;PHASES[0].enter();}

function update(dt){
  if(paused)return;
  if(fading){
    fadeT+=dt;
    if(fadeT<FADE){gAlpha=1-fadeT/FADE;PH.style.opacity=gAlpha;}
    else if(fadeT<FADE*2){if(fadeT-dt<FADE)resetToStart();gAlpha=(fadeT-FADE)/FADE;PH.style.opacity=gAlpha;}
    else{gAlpha=1;PH.style.opacity=1;fading=false;fadeT=0;}
    Object.values(PEERS).forEach(p=>{if(!p.vis)return;p.ea+=.55*dt;p.sL.forEach(l=>l.age+=dt);Object.values(p.rL).forEach(ls=>ls.forEach(l=>l.age+=dt));});
    return;
  }
  phT+=dt;
  const ph=PHASES[phIdx];
  if(ph.update)ph.update(dt);
  if(phT>=ph.dur){
    phT-=ph.dur;
    const next=(phIdx+1)%PHASES.length;
    if(next===0){fading=true;fadeT=0;}
    else{phIdx=next;PH.textContent=PHASES[phIdx].lbl;if(PHASES[phIdx].enter)PHASES[phIdx].enter();}
  }
  Object.values(PEERS).forEach(p=>{
    if(!p.vis)return;
    p.x+=(p.tx-p.x)*Math.min(1,dt*4);
    p.ea+=(p.sp>.1?12:.55)*dt;
    p.sp=Math.max(0,p.sp-dt*1.6);p.fl=Math.max(0,p.fl-dt*2.2);
    p.sL.forEach(l=>l.age+=dt);Object.values(p.rL).forEach(ls=>ls.forEach(l=>l.age+=dt));
  });
  blobs.forEach(b=>b.prog+=dt/b.dur);
  blobs=blobs.filter(b=>b.prog<=1.25);
  sparks.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=100*dt;s.life-=dt;});
  sparks=sparks.filter(s=>s.life>0);
}

function render(){
  X.clearRect(0,0,CV.width,CV.height);
  X.fillStyle='rgba(255,255,255,0.022)';
  for(let gx=20;gx<860;gx+=40)for(let gy=20;gy<345;gy+=40){X.beginPath();X.arc(gx,gy,1,0,Math.PI*2);X.fill();}
  X.save();X.globalAlpha=gAlpha;
  Object.values(PEERS).forEach(drawPeer);
  blobs.forEach(drawBlob);
  sparks.forEach(s=>{X.save();X.globalAlpha=s.life*.8;X.beginPath();X.arc(s.x,s.y,2.2,0,Math.PI*2);X.fillStyle=s.col;X.fill();X.restore();});
  X.restore();
}

function loop(ts){
  const dt=lastT?Math.min((ts-lastT)/1000,.05):0;
  lastT=ts;update(dt);render();requestAnimationFrame(loop);
}

document.getElementById('btn-pause').onclick=()=>{paused=!paused;document.getElementById('btn-pause').textContent=paused?'play':'pause';};
document.getElementById('btn-restart').onclick=()=>{fading=false;gAlpha=1;PH.style.opacity=1;resetToStart();};

resetToStart();requestAnimationFrame(loop);
</script>
</body>
</html>
