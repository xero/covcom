services:
  messenger:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "443:443"
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN}
      - PORT=${PORT:-1337}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ROOM_TTL=${ROOM_TTL:-24}
      - MAX_ROOM_SIZE=${MAX_ROOM_SIZE:-20}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
