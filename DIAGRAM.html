<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COVCOM Protocol Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
	/* fluid (liquid) type, mobile-first. min = mobile baseline, max = large screen;
	   size scales smoothly between them. tweak any min/max px pair to taste. */
	--fs-title:  clamp(13px, 10.3px + 0.74vw, 22px);
	--fs-phase:  clamp(11px,  8.9px + 0.57vw, 18px);
	--fs-button: clamp(10px,  8.5px + 0.41vw, 15px);
	--fs-legend: clamp( 9px,  7.5px + 0.41vw, 14px);
}
body{background:#0d1117;font-family:'Courier New',monospace;color:#c2c0b6;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh}
#title{font-size:var(--fs-title);letter-spacing:.1em;color:#c2c0b6;text-align:center;margin-bottom:6px;opacity:.7}
#phase{font-size:var(--fs-phase);color:#c2c0b6;text-align:center;letter-spacing:.06em;min-height:1.5em;margin-bottom:10px;transition:opacity .1s}
canvas{display:block;max-width:100%}
#controls{display:flex;gap:8px;margin-top:10px}
button{background:none;border:0.5px solid #1c1c1e;color:#636158;font-family:inherit;font-size:var(--fs-button);letter-spacing:.06em;padding:.5em 1.4em;cursor:pointer;transition:border-color .15s,color .15s}
button:hover{border-color:#444;color:#c2c0b6}
#legend{display:grid;grid-template-columns:auto auto auto;gap:5px;margin-top:12px;font-size:var(--fs-legend);color:#636158;letter-spacing:.04em;width:fit-content}
#legend dt,#legend dd{background:#161925;padding:.4em .7em;white-space:nowrap}
/* ultra-wide / high-dpi displays: step type up beyond the fluid max */
@media (width >= 1800px){
	:root{
		--fs-title:  26px;
		--fs-phase:  21px;
		--fs-button: 17px;
		--fs-legend: 16px;
	}
}
</style>
</head>
<body>
<div id="title">COVCOM protocol</div>
<div id="phase">…</div>
<canvas id="cv"></canvas>
<div id="controls">
  <button id="btn-pause">pause</button>
  <button id="btn-restart">restart</button>
</div>
<dl id="legend">
  <dt>⚙ large</dt><dd>ML-KEM epoch ratchet</dd><dd>auto or manual</dd>
  <dt>⚙ small</dt><dd>KDFChain</dd><dd>per-message</dd>
  <dt>▬ link</dt><dd>message key</dd><dd>wiped after use</dd>
  <dt>▭ msg</dt><dd>encrypted message</dd><dd>one per key</dd>
  <dt>● blob</dt><dd>Seal-encrypted relay</dd><dd>per recipient</dd>
  <dt>✓ check</dt><dd>Ed25519 sig verified</dd><dd>before decrypt</dd>
  <dt>▦ row</dt><dd>fingerprint</dd><dd>BLAKE3 of sign key</dd>
</dl>

<script>
const CV=document.getElementById('cv'),X=CV.getContext('2d');
const PH=document.getElementById('phase'),LEG=document.getElementById('legend');
// drawing happens in a fixed 860×345 design space; the canvas is scaled to fit
// the viewport (× devicePixelRatio for crispness) via a context transform.
const DESIGN_W=860,DH_TIGHT=290,DH_TALL=345,MAXW=1600;
let DESIGN_H=DH_TIGHT,AR=DESIGN_H/DESIGN_W;
function resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  // responsive aspect ratio: a wide diagram on a narrow screen renders as a thin
  // strip, so go taller (longer key chains) as width shrinks. the link-stack break
  // keys off DESIGN_H, so chain length fills the reclaimed height automatically.
  const t=Math.max(0,Math.min(1,(window.innerWidth-480)/(1024-480)));  // 0=narrow … 1=wide
  DESIGN_H=Math.round(DH_TALL+t*(DH_TIGHT-DH_TALL));
  AR=DESIGN_H/DESIGN_W;
  let cssW=Math.min(window.innerWidth-32,MAXW);
  const maxH=window.innerHeight-210;          // leave room for title/phase/controls/legend
  if(cssW*AR>maxH)cssW=maxH/AR;
  cssW=Math.max(300,cssW);
  const cssH=cssW*AR;
  CV.style.width=cssW+'px';CV.style.height=cssH+'px';
  LEG.style.maxWidth=cssW+'px';
  CV.width=Math.round(cssW*dpr);CV.height=Math.round(cssH*dpr);   // resets ctx state
  X.setTransform(CV.width/DESIGN_W,0,0,CV.height/DESIGN_H,0,0);   // map design → device px
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
const MO='"Courier New",monospace';
const c4=(hex,a)=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;};

const GY=102,KR=46,Kr=29,KT=16,CR=20,Cr=13,CT=9;
const SGY=GY+KR+CR+5;
const GGAP=CR*2+3;
const BDUR=1.4;

function gp(px){return{sx:px-GGAP/2,r0:px+GGAP/2,r1:px+GGAP*1.5};}

const COL={alice:'#1D9E75',bob:'#378ADD',charlie:'#EF9F27'};
// fp = fingerprint seed (a stand-in for BLAKE3(sessionPk,16)); changes ⇒ new identity
const FP0={alice:0x12345678,bob:0x87654321,charlie:0x4a17c0de};
const PEERS={
  alice:  {n:'alice',  col:COL.alice,  x:210,tx:210,epoch:0,out:0,sL:[],rL:{},ea:0,  sp:0,fl:0,vis:false,fp:FP0.alice,fpFlash:0},
  bob:    {n:'bob',    col:COL.bob,    x:650,tx:650,epoch:0,out:0,sL:[],rL:{},ea:1.1,sp:0,fl:0,vis:false,fp:FP0.bob,fpFlash:0},
  charlie:{n:'charlie',col:COL.charlie,x:1100,tx:1100,epoch:0,out:0,sL:[],rL:{},ea:2.2,sp:0,fl:0,vis:false,fp:FP0.charlie,fpFlash:0},
};
let blobs=[],sparks=[],ticks=[],paused=false,lastT=null;
let gAlpha=1,fading=false,fadeT=0;
const FADE=0.55;

// ── fingerprint palette: 16-byte digest → 8 OKLCh swatches (hue=high8, L=low8) ──
function mix(n){n=(n^61)^(n>>>16);n=(n+(n<<3))>>>0;n=n^(n>>>4);n=(n*0x27d4eb2d)>>>0;n=n^(n>>>15);return n>>>0;}
function oklch2hex(L,C,H){
  const hr=H*Math.PI/180,a=C*Math.cos(hr),b=C*Math.sin(hr);
  const l_=L+0.3963377774*a+0.2158037573*b,m_=L-0.1055613458*a-0.0638541728*b,s_=L-0.0894841775*a-1.2914855480*b;
  const l=l_*l_*l_,m=m_*m_*m_,s=s_*s_*s_;
  const R=4.0767416621*l-3.3077115913*m+0.2309699292*s;
  const G=-1.2684380046*l+2.6097574011*m-0.3413193965*s;
  const B=-0.0041960863*l-0.7034186147*m+1.7076147010*s;
  const g=x=>{x=Math.max(0,Math.min(1,x));return x<=0.0031308?12.92*x:1.055*Math.pow(x,1/2.4)-0.055;};
  const h=x=>Math.round(Math.max(0,Math.min(1,g(x)))*255).toString(16).padStart(2,'0');
  return '#'+h(R)+h(G)+h(B);
}
function fpSwatches(seed){
  const out=[];
  for(let i=0;i<8;i++){
    const v=mix(((seed*2654435761)>>>0)^((i+1)*0x9e3779b1>>>0));
    const hi=(v>>>8)&255,lo=v&255;
    out.push(oklch2hex(0.30+lo/255*0.55,0.15,hi/255*360));
  }
  return out;
}
function fpCols(p){if(p._fpKey!==p.fp){p._fpKey=p.fp;p._fpCols=fpSwatches(p.fp);}return p._fpCols;}

function spawnTick(x,y,col){ticks.push({x,y,age:0,col});}
function sendMsg(f,t){
  const fp=PEERS[f];fp.out++;fp.sL.unshift({age:0});if(fp.sL.length>9)fp.sL.pop();
  const tp=PEERS[t];if(!tp.rL[f])tp.rL[f]=[];tp.rL[f].unshift({age:0});if(tp.rL[f].length>9)tp.rL[f].pop();
  spawnTick(tp.x,SGY-12,fp.col);
}
function groupSend(names){
  const from=names[Math.floor(Math.random()*names.length)],others=names.filter(n=>n!==from),fp=PEERS[from];
  fp.out++;fp.sL.unshift({age:0});if(fp.sL.length>9)fp.sL.pop();
  others.forEach(to=>{const tp=PEERS[to];if(!tp.rL[from])tp.rL[from]=[];tp.rL[from].unshift({age:0});if(tp.rL[from].length>9)tp.rL[from].pop();spawnTick(tp.x,SGY-12,fp.col);});
}
function triggerRatchet(n,delay=0){
  setTimeout(()=>{
    const p=PEERS[n];p.epoch++;p.out=0;p.sL=[];p.rL={};p.sp=1.4;p.fl=1;
    for(let i=0;i<28;i++){const a=Math.random()*Math.PI*2,s=50+Math.random()*110;sparks.push({x:p.x,y:GY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:p.col});}
  },delay*1000);
}
function spawnBlob(f,t,lbl,delay,onLand){
  setTimeout(()=>{
    blobs.push({fx:PEERS[f].x,fy:GY,tp:t,prog:0,lbl,col:PEERS[f].col,dur:BDUR});
    setTimeout(()=>{spawnTick(PEERS[t].x,SGY-12,PEERS[f].col);if(onLand)onLand();},BDUR*1000);
  },delay*1000);
}

function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);
  X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);
  X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);
  X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);
}
function drawGear(cx,cy,R,r,teeth,angle,fill,stroke,lw){
  const s=Math.PI*2/teeth;
  X.save();X.beginPath();
  for(let i=0;i<teeth;i++){
    const a=angle+i*s,h=s*.20,g=s*.30;
    [[r,a-g],[R,a-h],[R,a+h],[r,a+g]].forEach(([rad,ang],j)=>{
      const px=cx+Math.cos(ang)*rad,py=cy+Math.sin(ang)*rad;
      j===0&&i===0?X.moveTo(px,py):X.lineTo(px,py);
    });
  }
  X.closePath();X.fillStyle=fill;X.fill();X.strokeStyle=stroke;X.lineWidth=lw;X.stroke();X.restore();
}
function drawFingerprint(p){
  const cols=fpCols(p),sw=7,gap=1.5,total=8*sw+7*gap,x0=Math.round(p.x)-total/2,y=36,h=7;
  if(p.fpFlash>0.02){
    X.save();X.globalAlpha=Math.min(1,p.fpFlash);X.strokeStyle=c4(p.col,.9);X.lineWidth=1.4;
    roundRect(x0-3,y-3,total+6,h+6,2.5);X.beginPath();roundRect(x0-3,y-3,total+6,h+6,2.5);X.stroke();X.restore();
  }
  for(let i=0;i<8;i++){
    const sx=x0+i*(sw+gap);
    X.fillStyle=cols[i];X.fillRect(sx,y,sw,h);
    X.strokeStyle='rgba(0,0,0,0.4)';X.lineWidth=0.5;X.strokeRect(sx+.25,y+.25,sw-.5,h-.5);
  }
}
function drawLinks(cx,col,links){
  if(!links||!links.length)return;
  const startY=SGY+CR+5,lh=10,lg=4,lw=17;
  for(let i=0;i<Math.min(links.length,9);i++){
    const y=startY+i*(lh+lg);if(y>DESIGN_H-14)break;
    const a=Math.max(0,(1-links[i].age/5)*(1-i*0.1));if(a<0.03)continue;
    X.save();X.globalAlpha=a;
    if(i>0){X.beginPath();X.moveTo(cx,y-lg);X.lineTo(cx,y);X.strokeStyle=c4(col,.22);X.lineWidth=0.7;X.stroke();}
    X.beginPath();roundRect(cx-lw/2,y,lw,lh,3);
    X.fillStyle=c4(col,.09);X.fill();X.strokeStyle=c4(col,.55);X.lineWidth=0.7;X.stroke();
    X.restore();
  }
}
function drawBlob(b){
  const t=b.prog;
  const tx=PEERS[b.tp].x,ty=GY;
  const tc=Math.min(t,1.0);
  const mx=(b.fx+tx)/2,my=Math.min(b.fy,ty)-65;
  const bx=(1-tc)*(1-tc)*b.fx+2*(1-tc)*tc*mx+tc*tc*tx;
  const by=(1-tc)*(1-tc)*b.fy+2*(1-tc)*tc*my+tc*tc*ty;
  const a=t<0.1?t/0.1:t>1.0?Math.max(0,(1.2-t)/0.2):1;
  if(a<=0)return;
  X.save();X.globalAlpha=a*.92;
  X.beginPath();X.arc(bx,by,14,0,Math.PI*2);X.fillStyle=c4(b.col,.1);X.fill();
  X.beginPath();X.arc(bx,by,4,0,Math.PI*2);X.fillStyle=b.col;X.fill();
  X.font=`8px ${MO}`;X.fillStyle=b.col;X.textAlign='center';
  b.lbl.split('\n').forEach((l,i)=>X.fillText(l,bx,by-18+i*10));
  X.restore();
}
function drawTick(tk){
  const a=tk.age<0.1?tk.age/0.1:Math.max(0,(0.78-tk.age)/0.68);
  if(a<=0)return;
  X.save();X.globalAlpha=a;X.font=`bold 14px ${MO}`;X.fillStyle=c4(tk.col,.98);
  X.textAlign='center';X.fillText('✓',tk.x+1.5,tk.y+3.5-tk.age*7);X.restore();
}
function drawPeer(p){
  if(!p.vis)return;
  const x=Math.round(p.x),pos=gp(x),rKeys=Object.keys(p.rL);
  X.font=`bold 13px ${MO}`;X.fillStyle=p.col;X.textAlign='center';X.fillText(p.n,x,18);
  X.font=`10px ${MO}`;X.fillStyle='rgba(160,158,150,0.6)';
  X.fillText(`epoch: ${p.epoch}  ·  sent: ${p.out}`,x,31);
  drawFingerprint(p);
  drawGear(x,GY,KR,Kr,KT,p.ea,c4(p.col,0.05+p.fl*0.14),c4(p.col,0.22+p.fl*0.78),1.6);
  X.beginPath();X.arc(x,GY,11,0,Math.PI*2);
  X.fillStyle=c4(p.col,.07);X.fill();X.strokeStyle=c4(p.col,.3);X.lineWidth=1;X.stroke();
  X.font=`bold 9px ${MO}`;X.fillStyle=c4(p.col,.85+p.fl*.15);
  X.textAlign='center';X.textBaseline='middle';
  X.fillText('KEM',x,GY-4.5);X.fillText(`E${p.epoch}`,x,GY+4.5);
  X.textBaseline='alphabetic';
  drawGear(pos.sx,SGY,CR,Cr,CT,-p.ea*2.3,c4(p.col,.04+p.fl*.1),c4(p.col,.4+p.fl*.55),1);
  X.beginPath();X.arc(pos.sx,SGY,8,0,Math.PI*2);X.fillStyle=c4(p.col,.1);X.fill();
  X.font=`bold 6px ${MO}`;X.fillStyle='rgba(225,223,215,0.9)';
  X.textAlign='center';X.textBaseline='middle';X.fillText('send',pos.sx,SGY);X.textBaseline='alphabetic';
  drawLinks(pos.sx,p.col,p.sL);
  rKeys.forEach((fn,i)=>{
    const rx=i===0?pos.r0:pos.r1,rc=PEERS[fn]?.col??'#888';
    drawGear(rx,SGY,CR,Cr,CT,p.ea*2.3,c4(rc,.03),c4(rc,.32),1);
    X.beginPath();X.arc(rx,SGY,8,0,Math.PI*2);X.fillStyle=c4(rc,.08);X.fill();
    X.font=`bold 6px ${MO}`;X.fillStyle='rgba(225,223,215,0.9)';
    X.textAlign='center';X.textBaseline='middle';X.fillText('←'+fn.slice(0,3),rx,SGY);X.textBaseline='alphabetic';
    drawLinks(rx,rc,p.rL[fn]);
  });
  if(!rKeys.length){
    X.font=`8px ${MO}`;X.fillStyle='rgba(160,158,150,0.28)';X.textAlign='center';
    X.fillText('awaiting',pos.r0,SGY);
  }
}

const PHASES=[
  // ── act I: protocol establishment (alice ↔ bob) ──
  {lbl:'establishing session: alice ↔ bob · signed identify (Ed25519 claim) · trust-on-first-sight',
   dur:2.4,
   enter(){
    Object.values(PEERS).forEach(p=>{p.epoch=0;p.out=0;p.sL=[];p.rL={};p.sp=0;p.fl=0;p.fpFlash=0;});
    PEERS.alice.fp=FP0.alice;PEERS.bob.fp=FP0.bob;PEERS.charlie.fp=FP0.charlie;
    PEERS.alice.vis=true;PEERS.alice.x=210;PEERS.alice.tx=210;
    PEERS.bob.vis=true;PEERS.bob.x=650;PEERS.bob.tx=650;
    PEERS.charlie.vis=false;PEERS.charlie.x=1100;PEERS.charlie.tx=1100;
    PEERS.alice.rL.bob=[];PEERS.bob.rL.alice=[];blobs=[];sparks=[];ticks=[];
    spawnBlob('alice','bob','identify\nclaim+sig',.3);
    spawnBlob('bob','alice','identify\nclaim+sig',.95);
   }},
  {lbl:'fingerprint check: BLAKE3(sessionPk) → 8-swatch palette · compared out-of-band',
   dur:2.6,
   enter(){PEERS.alice.fpFlash=1;PEERS.bob.fpFlash=1;},
   update(){if(PEERS.alice.fpFlash<0.25){PEERS.alice.fpFlash=1;PEERS.bob.fpFlash=1;}}},
  {lbl:'exchanging messages: KDFChain.step() · per-message Ed25519 sig verified before decrypt · key wiped',
   dur:6,nx:0,
   enter(){this.nx=.1;},
   update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.34+Math.random()*.44;groupSend(['alice','bob']);}}},
  {lbl:'auto-ratchet: ML-KEM encap · KDF_SCKA_RK · epoch 0→1 · all chain state wiped',dur:3.2,
   enter(){triggerRatchet('alice');triggerRatchet('bob',.6);setTimeout(()=>{PEERS.alice.rL.bob=[];PEERS.bob.rL.alice=[];},1700);}},
  {lbl:'epoch 1: past ciphertext unrecoverable · PCS at every KEM ratchet boundary',
   dur:4.5,nx:0,
   enter(){this.nx=.1;},
   update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.3+Math.random()*.38;groupSend(['alice','bob']);}}},

  // ── act II: charlie joins (3-party) ──
  {lbl:'charlie requests to join: peer_joined · charlie broadcasts a signed claim · new fingerprint',dur:2.8,
   enter(){
    PEERS.alice.tx=148;PEERS.bob.tx=430;
    PEERS.charlie.vis=true;PEERS.charlie.x=1100;PEERS.charlie.tx=712;
    PEERS.charlie.epoch=0;PEERS.charlie.out=0;PEERS.charlie.sL=[];PEERS.charlie.rL={};
    PEERS.charlie.fpFlash=1;
   },
   update(){if(PEERS.charlie.fpFlash<0.3)PEERS.charlie.fpFlash=1;}},
  {lbl:'relay: Seal(charlieEk, epoch‖seed) · charlie receives alice & bob\'s chain seeds',dur:3.2,
   enter(){
    spawnBlob('alice','charlie','Seal(ek\nepoch‖seed)',.25,()=>{PEERS.charlie.rL.alice=[];});
    spawnBlob('bob',  'charlie','Seal(ek\nepoch‖seed)',1.0, ()=>{PEERS.charlie.rL.bob=[];});
   }},
  {lbl:'welcome ratchet: charlie KEM encap · epoch 0→1 · ratchet_step (claim+sig) to all',dur:2.8,
   enter(){
    triggerRatchet('charlie',.45);
    const sd=0.65;
    spawnBlob('charlie','alice','ratchet_step\nclaim+sig',sd,    ()=>{PEERS.alice.rL.charlie=[];});
    spawnBlob('charlie','bob',  'ratchet_step\nclaim+sig',sd+.4, ()=>{PEERS.bob.rL.charlie=[];});
   }},
  {lbl:'3-party session: Sender Keys · per-sender KDFChain · ML-KEM-768 + XChaCha20 · every message signed',
   dur:6,nx:0,
   enter(){this.nx=.1;},
   update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.16+Math.random()*.26;groupSend(['alice','bob','charlie']);}}},
  {lbl:'alice rotates: ratchet_step per peer · new ratchet ek + continuation claim · epoch 1→2',dur:3.8,
   enter(){
    triggerRatchet('alice',.7);
    spawnBlob('alice','bob','ratchet_step\nclaim+sig',1.4,()=>{PEERS.alice.rL.bob=[];});
    spawnBlob('alice','charlie','ratchet_step\nclaim+sig',1.8,()=>{PEERS.alice.rL.charlie=[];});
   }},

  // ── act III: charlie disconnects and returns (reconnect) ──
  {lbl:'charlie disconnects: peer_left · alice & bob wipe charlie\'s chain state',dur:2.4,
   enter(){
    PEERS.charlie.tx=1100;PEERS.alice.tx=210;PEERS.bob.tx=650;
    setTimeout(()=>{delete PEERS.alice.rL.charlie;delete PEERS.bob.rL.charlie;PEERS.charlie.vis=false;},900);
   }},
  {lbl:'alice & bob chat: charlie\'s keys wiped · his past messages unrecoverable',
   dur:5,nx:0,
   enter(){this.nx=.1;},
   update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.3+Math.random()*.4;groupSend(['alice','bob']);}}},
  {lbl:'charlie returns: fresh session · epoch 0 · new keypair · NEW fingerprint · cryptographically a stranger',dur:3.4,
   enter(){
    PEERS.alice.tx=148;PEERS.bob.tx=430;
    PEERS.charlie.fp=0xb33f0d15;PEERS.charlie.fpFlash=1;
    PEERS.charlie.epoch=0;PEERS.charlie.out=0;PEERS.charlie.sL=[];PEERS.charlie.rL={};
    PEERS.charlie.x=1100;PEERS.charlie.tx=712;PEERS.charlie.vis=true;
   },
   update(){if(PEERS.charlie.fpFlash<0.3)PEERS.charlie.fpFlash=1;}},
  {lbl:'bob checks charlie\'s fingerprint; it differs from last session, so bob manually ratchets for forward secrecy',dur:3.0,
   enter(){
    PEERS.charlie.fpFlash=1;
    triggerRatchet('bob',.8);
    setTimeout(()=>{PEERS.bob.rL.alice=[];},1600);
   },
   update(){if(PEERS.charlie.fpFlash<0.3)PEERS.charlie.fpFlash=1;}},
  {lbl:'relay: alice & bob send current epoch seeds · charlie enters at their current epoch',dur:3.2,
   enter(){
    spawnBlob('alice','charlie','Seal(ek\nepoch‖seed)',.25,()=>{PEERS.charlie.rL.alice=[];});
    spawnBlob('bob',  'charlie','Seal(ek\nepoch‖seed)',1.0, ()=>{PEERS.charlie.rL.bob=[];});
   }},
  {lbl:'welcome ratchet: same dance as before · charlie epoch 0→1 · new signed claim to all',dur:2.8,
   enter(){
    triggerRatchet('charlie',.45);
    const sd=0.65;
    spawnBlob('charlie','alice','ratchet_step\nclaim+sig',sd,    ()=>{PEERS.alice.rL.charlie=[];});
    spawnBlob('charlie','bob',  'ratchet_step\nclaim+sig',sd+.4, ()=>{PEERS.bob.rL.charlie=[];});
   }},
  {lbl:'3-party resumed: forward secrecy held across the identity change · signatures + fingerprints intact',
   dur:11,nx:0,
   enter(){this.nx=.1;},
   update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.16+Math.random()*.26;groupSend(['alice','bob','charlie']);}}}
];

let phIdx=0,phT=0;
function resetToStart(){phIdx=0;phT=0;PH.textContent=PHASES[0].lbl;PHASES[0].enter();}

function ageState(dt){
  Object.values(PEERS).forEach(p=>{if(!p.vis)return;p.sL.forEach(l=>l.age+=dt);Object.values(p.rL).forEach(ls=>ls.forEach(l=>l.age+=dt));p.fpFlash=Math.max(0,p.fpFlash-dt*1.1);});
  ticks.forEach(t=>t.age+=dt);ticks=ticks.filter(t=>t.age<0.78);
}

function update(dt){
  if(paused)return;
  if(fading){
    fadeT+=dt;
    if(fadeT<FADE){gAlpha=1-fadeT/FADE;PH.style.opacity=gAlpha;}
    else if(fadeT<FADE*2){if(fadeT-dt<FADE)resetToStart();gAlpha=(fadeT-FADE)/FADE;PH.style.opacity=gAlpha;}
    else{gAlpha=1;PH.style.opacity=1;fading=false;fadeT=0;}
    Object.values(PEERS).forEach(p=>{if(p.vis)p.ea+=.55*dt;});
    ageState(dt);
    return;
  }
  phT+=dt;
  const ph=PHASES[phIdx];
  if(ph.update)ph.update(dt);
  if(phT>=ph.dur){
    phT-=ph.dur;
    const next=(phIdx+1)%PHASES.length;
    if(next===0){fading=true;fadeT=0;}
    else{phIdx=next;PH.textContent=PHASES[phIdx].lbl;if(PHASES[phIdx].enter)PHASES[phIdx].enter();}
  }
  Object.values(PEERS).forEach(p=>{
    if(!p.vis)return;
    p.x+=(p.tx-p.x)*Math.min(1,dt*4);
    p.ea+=(p.sp>.1?12:.55)*dt;
    p.sp=Math.max(0,p.sp-dt*1.6);p.fl=Math.max(0,p.fl-dt*2.2);
  });
  ageState(dt);
  blobs.forEach(b=>b.prog+=dt/b.dur);
  blobs=blobs.filter(b=>b.prog<=1.25);
  sparks.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=100*dt;s.life-=dt;});
  sparks=sparks.filter(s=>s.life>0);
}

function render(){
  X.clearRect(0,0,DESIGN_W,DESIGN_H);
  X.fillStyle='rgba(255,255,255,0.022)';
  for(let gx=20;gx<DESIGN_W;gx+=40)for(let gy=20;gy<DESIGN_H;gy+=40){X.beginPath();X.arc(gx,gy,1,0,Math.PI*2);X.fill();}
  X.save();X.globalAlpha=gAlpha;
  Object.values(PEERS).forEach(drawPeer);
  blobs.forEach(drawBlob);
  ticks.forEach(drawTick);
  sparks.forEach(s=>{X.save();X.globalAlpha=s.life*.8;X.beginPath();X.arc(s.x,s.y,2.2,0,Math.PI*2);X.fillStyle=s.col;X.fill();X.restore();});
  X.restore();
}

function loop(ts){
  const dt=lastT?Math.min((ts-lastT)/1000,.05):0;
  lastT=ts;update(dt);render();requestAnimationFrame(loop);
}

document.getElementById('btn-pause').onclick=()=>{paused=!paused;document.getElementById('btn-pause').textContent=paused?'play':'pause';};
document.getElementById('btn-restart').onclick=()=>{fading=false;gAlpha=1;PH.style.opacity=1;resetToStart();};

resetToStart();requestAnimationFrame(loop);
</script>
</body>
