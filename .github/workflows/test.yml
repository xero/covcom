name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: lint
        run: bun run lint
      - name: typecheck
        run: bun run typecheck

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: unit tests (server, lib, web, cli)
        run: bun run test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: e2e tests (${{ matrix.browser }})
        run: bunx playwright test --project=${{ matrix.browser }}
      - name: upload timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-timing-${{ matrix.browser }}
          path: web/test/e2e/results/timing.json
          if-no-files-found: ignore
          retention-days: 7
      - name: upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            web/test/e2e/results/
          retention-days: 7

  e2e-timing-summary:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    permissions:
      contents: read
      actions: read
      packages: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: download timing artifacts
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: e2e-timing-*
          path: timing-artifacts
      - name: write job summary
        run: bun web/test/e2e/timing-summary.ts timing-artifacts

  cross-client:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: build web client
        run: bun run build:web
      - name: build cli binary
        run: bun run build:cli
      - name: cross-client test (web + cli)
        run: bun run test:cross

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          # This job is a from-scratch build smoke test: every layer must run so a
          # broken Dockerfile step can't hide behind a cache hit. No cache in,
          # nothing written out.
          no-cache: true
