name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: lint
        run: bun run lint
      - name: typecheck
        run: bun run typecheck

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: unit tests (server, lib, web, cli)
        run: bun run test

  # The compiled server binary must pass the same black-box suite as source
  # mode. This catches tree-shaking regressions, embedded-asset breakage, and
  # env-handling drift in compiled mode on every push. Host target only; the
  # release workflow builds the full cross-target matrix.
  binary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: compile server binary and test against it
        run: bun run test:server:bin

  # Every PR proves the npm staging is publishable without publishing
  # anything: stage host-target packages, npm publish --dry-run each, and
  # smoke the launcher shim against the host platform package. Runs on the
  # plain runner (not the CI container) because it needs node and npm.
  # Cross-target compilation stays out of PR CI; the release workflow owns
  # the full matrix.
  npm-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: install
        run: bun i
      - name: build host binaries and stage npm packages
        run: |
          bun scripts/build.ts cli --kind npm
          bun scripts/build.ts server --kind npm
      - name: validate staged packages (npm publish --dry-run)
        run: |
          set -e
          for dir in dist/npm/*/; do
            echo "== $dir"
            npm publish --dry-run "$dir"
          done
      # The shim resolves its platform package through node_modules, so lay
      # the staged dirs out as an install would and assert the shim's
      # --version output matches the binary invoked directly.
      - name: shim smoke test
        run: |
          set -e
          mkdir -p /tmp/shim-smoke/node_modules/@covcom
          cp -R dist/npm/covcom /tmp/shim-smoke/node_modules/covcom
          cp -R dist/npm/covcom-server /tmp/shim-smoke/node_modules/covcom-server
          cp -R dist/npm/cli-linux-x64 /tmp/shim-smoke/node_modules/@covcom/cli-linux-x64
          cp -R dist/npm/server-linux-x64 /tmp/shim-smoke/node_modules/@covcom/server-linux-x64
          shim_cli=$(node /tmp/shim-smoke/node_modules/covcom/bin/covcom --version)
          direct_cli=$(cli/dist/covcom-linux-x64 --version)
          echo "cli shim:   $shim_cli"
          echo "cli direct: $direct_cli"
          test "$shim_cli" = "$direct_cli"
          shim_srv=$(node /tmp/shim-smoke/node_modules/covcom-server/bin/covcom-server --version)
          direct_srv=$(server/dist/covcom-server-linux-x64 --version)
          echo "server shim:   $shim_srv"
          echo "server direct: $direct_srv"
          test "$shim_srv" = "$direct_srv"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: e2e tests (${{ matrix.browser }})
        run: bunx playwright test --project=${{ matrix.browser }}
      - name: upload timing
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-timing-${{ matrix.browser }}
          path: web/test/e2e/results/timing.json
          if-no-files-found: ignore
          retention-days: 7
      - name: upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            playwright-report/
            web/test/e2e/results/
          retention-days: 7

  e2e-timing-summary:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    permissions:
      contents: read
      actions: read
      packages: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: download timing artifacts
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: e2e-timing-*
          path: timing-artifacts
      - name: write job summary
        run: bun web/test/e2e/timing-summary.ts timing-artifacts

  cross-client:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ghcr.io/xero/covcom/ci:latest
      options: --user root
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install
        run: bun i
      - name: build web client
        run: bun run build:web
      - name: cross-client test (web + cli)
        run: bun run test:cross

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          # This job is a from-scratch build smoke test: every layer must run so a
          # broken Dockerfile step can't hide behind a cache hit. No cache in,
          # nothing written out.
          no-cache: true
