# Release pipeline: one manual dispatch cuts every channel from a single
# version bump: git tag, GitHub release, Docker images, and npm packages
# (covcom, covcom-server, and their @covcom/* platform packages).
#
# Setup prerequisites:
#   - NPM_TOKEN secret with publish rights to the covcom and covcom-server
#     packages and the @covcom org (already claimed).
#   - APP_ID / APP_PRIVATE_KEY for the commit-and-push app token.
#   - DOCKERHUB_USERNAME / DOCKERHUB_TOKEN.
#
# Rerun semantics: reruns are safe at any step because the repo on GitHub is
# not mutated until the "commit, tag, and push" step, after Docker and npm
# have both succeeded. Docker retags overwrite on retry; the npm publish
# steps check `npm view` first and skip versions that already exist, so a
# rerun after a partial npm failure republishes only the missing packages.
# Registries are pushed in order of reversibility: Docker (retaggable), then
# npm (72-hour unpublish window), then git, which a revert plus force-push is
# the only way back out of.
name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
      message:
        description: 'Deprecation message for the outgoing version'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    steps:
      # tombstone.ts stamps the reason into the SECURITY.md and DOCKERHUB.md
      # version tables and npm deprecate reuses it verbatim, so a blank or
      # whitespace reason must die before anything else runs.
      - name: require a real deprecation reason
        env:
          REASON: ${{ inputs.message }}
        run: |
          if [ -z "$(echo "$REASON" | tr -d '[:space:]')" ]; then
            echo "deprecation reason is empty or whitespace" >&2
            exit 1
          fi

      - name: generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # Registry logins run first as the fail-fast credential gate: an expired
      # Docker Hub PAT or npm token dies here, before any file is edited or
      # artifact built.
      - name: login to docker hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: login to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: setup node (npm registry)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: verify npm token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: install
        run: bun i

      - name: capture outgoing version
        run: echo "OLD_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: bump version and deprecate previous (tombstone.ts)
        env:
          BUMP: ${{ inputs.version }}
          REASON: ${{ inputs.message }}
        run: bun versionbump "$BUMP" "$REASON"

      - name: capture new version
        run: echo "NEW_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      # Everything compiles and stages before anything publishes. bake runs
      # version codegen first, builds the web SPA, compiles every cli and
      # server target, and stages the npm package trees under dist/npm/, so
      # a compile failure dies here, before any registry push or git
      # mutation.
      - name: build all targets and stage npm packages (bake)
        run: bun run bake

      - name: compress and checksum release assets
        run: |
          mkdir -p dist/release
          cp cli/dist/covcom-* server/dist/covcom-server-* dist/release/
          cd dist/release
          xz -9 -T0 covcom-*
          # the web client ships uncompressed: covcom.html is a download-and-
          # open artifact, so it must land here after the xz glob has run
          cp ../../web/dist/index.html covcom.html
          sha256sum covcom-*.xz covcom.html > SHA256SUMS

      # Keyless OIDC-backed provenance; consumers verify a download with
      # `gh attestation verify <asset> --repo xero/covcom`. No signing key
      # exists in CI by design.
      - name: attest binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/release/covcom-*.xz
            dist/release/covcom.html

      # Docker first: the most reversible registry. A retag on rerun simply
      # overwrites.
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            xerostyle/covcom
            ghcr.io/xero/covcom
          tags: |
            type=raw,value=${{ env.NEW_VERSION }}
            type=raw,value=latest

      - name: build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: sync hub readme
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: xerostyle/covcom
          readme-filepath: ./docker/DOCKERHUB.md

      # Tombstone the outgoing tag: pulling it now fails by design. Build context
      # lives in RUNNER_TEMP so it never lands in the release commit.
      - name: write tombstone build context
        env:
          REASON: ${{ inputs.message }}
        run: |
          mkdir -p "$RUNNER_TEMP/tombstone"
          cat > "$RUNNER_TEMP/tombstone/DEPRECATED.txt" <<EOF
          DEPRECATED: ${REASON}
          Replacement: ${NEW_VERSION}
          EOF
          cat > "$RUNNER_TEMP/tombstone/Dockerfile" <<EOF
          FROM busybox
          LABEL deprecated="true"
          LABEL deprecated.reason="${REASON}"
          LABEL deprecated.replacement="${NEW_VERSION}"
          COPY DEPRECATED.txt /DEPRECATED.txt
          ENTRYPOINT ["sh", "-c", "cat /DEPRECATED.txt >&2; exit 1"]
          EOF

      - name: build and push tombstone
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ runner.temp }}/tombstone
          file: ${{ runner.temp }}/tombstone/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            xerostyle/covcom:${{ env.OLD_VERSION }}
            ghcr.io/xero/covcom:${{ env.OLD_VERSION }}

      # npm deprecation of the outgoing version mirrors the Docker tombstone,
      # driven by the same reason string. Deprecate-before-publish is
      # deliberate: if deprecation fails, the run stops before the new
      # version exists anywhere, which is recoverable. Skips versions that
      # were never published (including the first npm release).
      - name: deprecate outgoing npm versions
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          REASON: ${{ inputs.message }}
        run: |
          for name in covcom covcom-server; do
            if npm view "$name@$OLD_VERSION" version > /dev/null 2>&1; then
              npm deprecate "$name@$OLD_VERSION" "$REASON"
              echo "deprecated $name@$OLD_VERSION"
            else
              echo "$name@$OLD_VERSION not on the registry; skipping"
            fi
          done

      # Platform packages first so a meta package can never exist whose
      # optionalDependencies are unpublished. Each publish is idempotent:
      # versions already on the registry are skipped, so a rerun after a
      # partial failure republishes only the missing packages.
      - name: publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish() {
            local dir="$1"
            local name version
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version > /dev/null 2>&1; then
              echo "$name@$version already published; skipping"
            else
              npm publish "$dir" --access public --provenance
            fi
          }
          for dir in dist/npm/cli-* dist/npm/server-*; do
            publish "$dir"
          done
          publish dist/npm/covcom
          publish dist/npm/covcom-server

      # The first and only moment the covcom repo on GitHub is mutated.
      - name: commit, tag, and push
        run: |
          git config user.name  "leviathan-cicd[bot]"
          git config user.email "leviathan-cicd[bot]@users.noreply.github.com"
          git add package.json bun.lock SECURITY.md docker/DOCKERHUB.md
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "release v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"

      - name: create github release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --generate-notes \
            --verify-tag \
            dist/release/covcom-*.xz \
            dist/release/covcom.html \
            dist/release/SHA256SUMS

      - name: prepend deprecation banner to previous release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REASON: ${{ inputs.message }}
        run: |
          set -e
          if ! gh release view "v${OLD_VERSION}" --json body -q .body > /tmp/existing.md 2>/dev/null; then
            echo "no release v${OLD_VERSION} to annotate; skipping"
            exit 0
          fi
          {
            echo "> [!CAUTION]"
            echo "> **This release is deprecated.** ${REASON}"
            echo ">"
            echo "> Use \`${NEW_VERSION}\` instead. Pulling this image tag will fail with a runtime error by design."
            echo ""
            echo "---"
            echo ""
            cat /tmp/existing.md
          } > /tmp/release-notes.md
          gh release edit "v${OLD_VERSION}" --notes-file /tmp/release-notes.md
