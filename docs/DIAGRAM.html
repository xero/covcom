<title>COVCOM Protocol Diagram</title>
<style>
:root {
  /* palette */
  --leaf: #2a6013;
  --depths: #161925;
  --charcoal: #252216;
  --poseidon: #114b5f;
  --ocean: #1c7293;
  --mist: #c6dabf;
  --bone: #d4d6b6;
  --error: #c0392b;
  --ruby: #931a3e;
  --midnight: #0d1117;
  --scales: #1a936f;
  --bone: #c2c0b6;
  --abyss: #161925;
  --stone: #636158;
  --char: #1c1c1e;
  --ash: #444;
  --bg: var(--midnight);
  --text: var(--bone);
  --muted: var(--stone);
  --panel: var(--abyss);
  --border: var(--abyss);
  --border-hover: var(--poseidon);
  --fs-title: clamp(13px, 10.3px + 0.74vw, 22px);
  --fs-phase: clamp(11px, 8.9px + 0.57vw, 18px);
  --fs-button: clamp(10px, 8.5px + 0.41vw, 15px);
  --fs-legend: clamp(9px, 7.5px + 0.41vw, 14px);
}
* {margin:0;padding:0;box-sizing:border-box}
body {background: var(--bg);font-family:"Courier New", monospace;color:var(--text);padding:16px;min-height:100vh}
header {display:flex;flex-direction:column;width:fit-content;font-size:var(--fs-title);letter-spacing:0.1em;color:var(--text);text-align: center; margin: 5px auto 10px auto; border-bottom: 3px solid var(--abyss);padding:8px;
  a svg {width:115px;height:18px;fill:var(--scales);filter:drop-shadow(3px 3px 0px var(--midnight));flex-shrink:0;margin-right:1em}
}
figure {display:flex;flex-direction:column;align-items:center;max-width:100%}
#phase {font-size:var(--fs-phase);line-height:1.5;color:var(--text);text-align:center;letter-spacing:0.06em;width:min(100%,90ch);min-height:4.6em;margin-bottom:10px;display:grid;place-items:center;text-wrap:balance;overflow-wrap:break-word;transition:opacity 0.1s;
	a {color:var(--muted);text-decoration:none;font-size:1.1em;padding:0 0.1em;transition:color 0.15s;vertical-align:text-bottom; line-height:0.5em;
		&:hover,&:focus-visible {color:var(--text)}
	}
}
canvas {display:block;max-width:100%}
nav {display:flex;justify-content:center;gap:18px;margin:10px 0 30px 0;
	button {background:var(--poseidon);border:0.3em solid var(--border);color:var(--text);font-family:inherit;font-size:var(--fs-button);letter-spacing:0.06em;padding:0.5em 1.4em;width:8em;cursor:pointer;transition:border-color 0.5s,background 0.5s,color 0.5s;
		&:hover {
			background: var(--ocean);
			border-color: var(--border-hover);
			color: var(--mist);
		}
		&:focus-visible {outline:2px solid var(--text);outline-offset:2px}
	}
}
#legend {display:grid;grid-template-columns:auto auto auto;gap:5px;margin:12px auto 0;font-size:var(--fs-legend);color:var(--muted);letter-spacing:0.04em;width:fit-content;
	dt {display:flex;align-items:center;justify-content:center;background:var(--panel);padding:0.2em 0.3em;
		canvas {display:block;width:48px;height:40px}
	}
	dd {display:flex;align-items:center;background:var(--panel);padding:0.4em 0.7em;white-space:nowrap;
		* {display:block}
		a {color:var(--text);text-decoration:none;transition:color 0.15s;padding-inline:0.6em;
			&:hover,&:focus-visible {color:#e9e7dd }
		}
	}
}
@media (width >= 720px) {
	header{flex-direction:row;
		a svg{width:141px;height:23px;
		}
	}
  #phase{min-height: 3.2em}
}
@media (width >= 1800px) {
  :root {--fs-title:26px;--fs-phase:21px;--fs-button:17px;--fs-legend:16px}
}

<script>
function el(i){return document.getElementById(i)}
const CV=el('cv');let X=CV.getContext('2d');
const PH=el('phase'),LEG=el('legend');
let DESIGN_W=860;const DH_TIGHT=290,DH_TALL=345,MAXW=1600;
const DESIGN_W_V=440,DESIGN_H_V=560,KXV=92,SV=[188,243,298],HXV=30;
let axis='h';
let DESIGN_H=DH_TIGHT,AR=DESIGN_H/DESIGN_W,cssW=0;
function resizeCanvas(){
	const dpr=window.devicePixelRatio||1;
	axis=window.innerWidth<720?'v':'h';
	if(axis==='v'){
		DESIGN_W=DESIGN_W_V;DESIGN_H=DESIGN_H_V;AR=DESIGN_H/DESIGN_W;
		cssW=Math.min(window.innerWidth-32,520);
		const maxH=window.innerHeight-180;
		if(cssW*AR>maxH)cssW=maxH/AR;
		cssW=Math.max(280,cssW);
	}else{
		DESIGN_W=860;
		const t=Math.max(0,Math.min(1,(window.innerWidth-480)/(1024-480)));  // 0=narrow,1=wide
		DESIGN_H=Math.round(DH_TALL+t*(DH_TIGHT-DH_TALL));
		AR=DESIGN_H/DESIGN_W;
		cssW=Math.min(window.innerWidth-32,MAXW);
		const maxH=window.innerHeight-210;
		if(cssW*AR>maxH)cssW=maxH/AR;
		cssW=Math.max(300,cssW);
	}
	const cssH=cssW*AR;
	CV.style.width=cssW+'px';CV.style.height=cssH+'px';
	LEG.style.maxWidth=cssW+'px';PH.style.maxWidth=cssW+'px';
	CV.width=Math.round(cssW*dpr);CV.height=Math.round(cssH*dpr);
	X.setTransform(CV.width/DESIGN_W,0,0,CV.height/DESIGN_H,0,0);
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();
const MO='"Courier New",monospace';
const c4=(hex,a)=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;};
const fz=px=>px*DESIGN_W/cssW;
const gz=(px,R,k)=>Math.min(fz(px),R*k);
const GY=102,KR=46,Kr=29,KT=16,CR=20,Cr=13,CT=9;
const SGY=GY+KR+CR+5;
const GGAP=CR*2+3;
const BDUR=1.4;
function gp(px){return{sx:px-GGAP/2,r0:px+GGAP/2,r1:px+GGAP*1.5};}
const COL={Alice:'#1D9E75',Bob:'#378ADD',Charlie:'#EF9F27'};
const FP0={Alice:0x12345678,Bob:0x87654321,Charlie:0x4a17c0de};
const PEERS={
	Alice:  {n:'Alice',  col:COL.Alice,  x:210,tx:210,epoch:0,out:0,sL:[],rL:{},ea:0,  sp:0,fl:0,vis:false,fp:FP0.Alice,fpFlash:0},
	Bob:    {n:'Bob',    col:COL.Bob,    x:650,tx:650,epoch:0,out:0,sL:[],rL:{},ea:1.1,sp:0,fl:0,vis:false,fp:FP0.Bob,fpFlash:0},
	Charlie:{n:'Charlie',col:COL.Charlie,x:1100,tx:1100,epoch:0,out:0,sL:[],rL:{},ea:2.2,sp:0,fl:0,vis:false,fp:FP0.Charlie,fpFlash:0},
};
let blobs=[],sparks=[],ticks=[],chunks=[],paused=false,lastT=null;
let gAlpha=1,fading=false,fadeT=0;
const FADE=0.55;
// fingerprint palette: 16-byte digest → 8 OKLCh swatches (hue=high8, L=low8)
function mix(n){n=(n^61)^(n>>>16);n=(n+(n<<3))>>>0;n=n^(n>>>4);n=(n*0x27d4eb2d)>>>0;n=n^(n>>>15);return n>>>0;}
function oklch2hex(L,C,H){
	const hr=H*Math.PI/180,a=C*Math.cos(hr),b=C*Math.sin(hr);
	const l_=L+0.3963377774*a+0.2158037573*b,m_=L-0.1055613458*a-0.0638541728*b,s_=L-0.0894841775*a-1.2914855480*b;
	const l=l_*l_*l_,m=m_*m_*m_,s=s_*s_*s_;
	const R=4.0767416621*l-3.3077115913*m+0.2309699292*s;
	const G=-1.2684380046*l+2.6097574011*m-0.3413193965*s;
	const B=-0.0041960863*l-0.7034186147*m+1.7076147010*s;
	const g=x=>{x=Math.max(0,Math.min(1,x));return x<=0.0031308?12.92*x:1.055*Math.pow(x,1/2.4)-0.055;};
	const h=x=>Math.round(Math.max(0,Math.min(1,g(x)))*255).toString(16).padStart(2,'0');
	return '#'+h(R)+h(G)+h(B);
}
function fpSwatches(seed){
	const out=[];
	for(let i=0;i<8;i++){
		const v=mix(((seed*2654435761)>>>0)^((i+1)*0x9e3779b1>>>0));
		const hi=(v>>>8)&255,lo=v&255;
		out.push(oklch2hex(0.30+lo/255*0.55,0.15,hi/255*360));
	}
	return out;
}
function fpCols(p){if(p._fpKey!==p.fp){p._fpKey=p.fp;p._fpCols=fpSwatches(p.fp);}return p._fpCols;}
function spawnTick(x,y,col,pn){ticks.push({x,y,age:0,col,pn});}
function sendMsg(f,t){
	const fp=PEERS[f];fp.out++;fp.sL.unshift({age:0});if(fp.sL.length>9)fp.sL.pop();
	const tp=PEERS[t];if(!tp.rL[f])tp.rL[f]=[];tp.rL[f].unshift({age:0});if(tp.rL[f].length>9)tp.rL[f].pop();
	spawnTick(tp.x,SGY-12,fp.col,t);
}
function groupSend(names){
	const from=names[Math.floor(Math.random()*names.length)],others=names.filter(n=>n!==from),fp=PEERS[from];
	fp.out++;fp.sL.unshift({age:0});if(fp.sL.length>9)fp.sL.pop();
	others.forEach(to=>{const tp=PEERS[to];if(!tp.rL[from])tp.rL[from]=[];tp.rL[from].unshift({age:0});if(tp.rL[from].length>9)tp.rL[from].pop();spawnTick(tp.x,SGY-12,fp.col,to);});
}
function triggerRatchet(n,delay=0){
	setTimeout(()=>{
		const p=PEERS[n];p.epoch++;p.out=0;p.sL=[];p.sp=1.4;p.fl=1;
		const ox=axis==='v'?KXV:p.x,oy=axis==='v'?(p.vy||DESIGN_H/2):GY;
		for(let i=0;i<28;i++){const a=Math.random()*Math.PI*2,s=50+Math.random()*110;sparks.push({x:ox,y:oy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:p.col});}
	},delay*1000);
}
function spawnBlob(f,t,lbl,delay,onLand){
	setTimeout(()=>{
		blobs.push({fx:PEERS[f].x,fy:GY,from:f,tp:t,prog:0,lbl,col:PEERS[f].col,dur:BDUR});
		setTimeout(()=>{spawnTick(PEERS[t].x,SGY-12,PEERS[f].col,t);if(onLand)onLand();},BDUR*1000);
	},delay*1000);
}
const FCHUNK_DUR=0.9,FCHUNK_GAP=180;
function spawnFile(from,toList,n){
	const fp=PEERS[from];
	fp.out++;
	fp.sL.unshift({age:0,kind:'file',fill:1,done:true,flash:.8});  // sender: sent, solid
	if(fp.sL.length>9)fp.sL.pop();
	toList.forEach(to=>{
		const tp=PEERS[to];
		if(!tp.rL[from])tp.rL[from]=[];
		const link={age:0,kind:'file',fill:0,done:false,flash:0};   // receiver: pulses+fills
		tp.rL[from].unshift(link);
		if(tp.rL[from].length>9)tp.rL[from].pop();
		for(let i=0;i<n;i++){
			const final=i===n-1,lead=i===0,frac=(i+1)/n;
			setTimeout(()=>{
				chunks.push({from,to,prog:0,dur:FCHUNK_DUR,col:fp.col,lead,arrived:false,
					onArrive(){
						link.flash=1;link.fill=Math.min(1,frac);
						spawnTick(tp.x,SGY-12,fp.col);
						if(final){link.done=true;link.fill=1;}
					}});
			},i*FCHUNK_GAP);
		}
	});
}
function roundRect(x,y,w,h,r){
	r=Math.min(r,w/2,h/2);
	X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);
	X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);
	X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);
	X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);
}
function drawGear(cx,cy,R,r,teeth,angle,fill,stroke,lw){
	const s=Math.PI*2/teeth;
	X.save();X.beginPath();
	for(let i=0;i<teeth;i++){
		const a=angle+i*s,h=s*.20,g=s*.30;
		[[r,a-g],[R,a-h],[R,a+h],[r,a+g]].forEach(([rad,ang],j)=>{
			const px=cx+Math.cos(ang)*rad,py=cy+Math.sin(ang)*rad;
			j===0&&i===0?X.moveTo(px,py):X.lineTo(px,py);
		});
	}
	X.closePath();X.fillStyle=fill;X.fill();X.strokeStyle=stroke;X.lineWidth=lw;X.stroke();X.restore();
}
function drawFingerprint(p){
	const cols=fpCols(p),sw=7,gap=1.5,total=8*sw+7*gap,x0=Math.round(p.x)-total/2,y=40,h=7;
	if(p.fpFlash>0.02){
		X.save();X.globalAlpha=Math.min(1,p.fpFlash);X.strokeStyle=c4(p.col,.9);X.lineWidth=1.4;
		roundRect(x0-3,y-3,total+6,h+6,2.5);X.beginPath();roundRect(x0-3,y-3,total+6,h+6,2.5);X.stroke();X.restore();
	}
	for(let i=0;i<8;i++){

	 enter(){

		setTimeout(()=>{delete PEERS.Alice.rL.Charlie;delete PEERS.Bob.rL.Charlie;PEERS.Charlie.vis=false;},900);
	 }},
	{lbl:'Alice and Bob keep talking. Charlie\'s keys are gone, and his old messages can\'t be recovered. <a href="https://github.com/xero/covcom/wiki/PROTOCOL#security-properties" target="_blank">&#x2BA1;</a>',
	 dur:5,nx:0,
	 enter(){this.nx=.1;},
	 update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.3+Math.random()*.4;groupSend(['Alice','Bob']);}}},
	{lbl:'Charlie comes back, but with a fresh session and a new keypair. New fingerprint, so to the crypto he\'s a stranger. <a href="https://github.com/xero/covcom/wiki/PROTOCOL#session-lifecycle" target="_blank">&#x2BA1;</a>',dur:3.4,
	 enter(){
		PEERS.Alice.tx=148;PEERS.Bob.tx=430;
		PEERS.Charlie.fp=0xb33f0d15;PEERS.Charlie.fpFlash=1;
		PEERS.Charlie.epoch=0;PEERS.Charlie.out=0;PEERS.Charlie.sL=[];PEERS.Charlie.rL={};
		PEERS.Charlie.x=1100;PEERS.Charlie.tx=712;PEERS.Charlie.vis=true;
	 },
	 update(){if(PEERS.Charlie.fpFlash<0.3)PEERS.Charlie.fpFlash=1;}},
	{lbl:'Bob checks Charlie\'s new fingerprint, sees it changed since last time, and ratchets by hand to stay forward secret. <a href="https://github.com/xero/covcom/wiki/CRYPTOGRAPHY#fingerprint-derivation" target="_blank">&#x2BA1;</a>',dur:3.0,
	 enter(){
		PEERS.Charlie.fpFlash=1;
		triggerRatchet('Bob',.8);
		setTimeout(()=>{PEERS.Alice.rL.Bob=[];},1600);
	 },
	 update(){if(PEERS.Charlie.fpFlash<0.3)PEERS.Charlie.fpFlash=1;}},
	{lbl:'Alice and Bob send their current seeds, and Charlie joins right where they are now. <a href="https://github.com/xero/covcom/wiki/CRYPTOGRAPHY#chain-seed-distribution" target="_blank">&#x2BA1;</a>',dur:3.2,
	 enter(){
		spawnBlob('Alice','Charlie','Seal(ek\nepoch‖seed)',.25,()=>{PEERS.Charlie.rL.Alice=[];});
		spawnBlob('Bob',  'Charlie','Seal(ek\nepoch‖seed)',1.0, ()=>{PEERS.Charlie.rL.Bob=[];});
	 }},
	{lbl:'The welcome ratchet runs again. Charlie steps to epoch 1 and signs a fresh claim to the room. <a href="https://github.com/xero/covcom/wiki/PROTOCOL#joining-a-room" target="_blank">&#x2BA1;</a>',dur:2.8,
	 enter(){
		triggerRatchet('Charlie',.45);
		const sd=0.65;
		spawnBlob('Charlie','Alice','ratchet_step\nclaim+sig',sd,    ()=>{PEERS.Alice.rL.Charlie=[];});
		spawnBlob('Charlie','Bob',  'ratchet_step\nclaim+sig',sd+.4, ()=>{PEERS.Bob.rL.Charlie=[];});
	 }},
	{lbl:'The room is three again. Forward secrecy held through Charlie\'s identity change, with signatures and fingerprints intact. <a href="https://github.com/xero/covcom/wiki/PROTOCOL#security-properties" target="_blank">&#x2BA1;</a>',
	 dur:11,nx:0,
	 enter(){this.nx=.1;},
	 update(dt){this.nx-=dt;if(this.nx<=0){this.nx=.16+Math.random()*.26;groupSend(['Alice','Bob','Charlie']);}}}
];
let phIdx=0,phT=0;
function setPhase(i){PH.innerHTML='<span class="cap">'+PHASES[i].lbl+'</span>';}
function resetToStart(){phIdx=0;phT=0;setPhase(0);PHASES[0].enter();}
function ageState(dt){
	Object.values(PEERS).forEach(p=>{if(!p.vis)return;
		p.sL.forEach(l=>{l.age+=dt;if(l.flash>0)l.flash=Math.max(0,l.flash-dt*2.4);});
		Object.values(p.rL).forEach(ls=>ls.forEach(l=>{l.age+=dt;if(l.flash>0)l.flash=Math.max(0,l.flash-dt*2.4);}));
		p.fpFlash=Math.max(0,p.fpFlash-dt*1.1);});
	ticks.forEach(t=>t.age+=dt);ticks=ticks.filter(t=>t.age<0.78);
}
function update(dt){
	if(paused)return;
	if(axis==='v')easeV(dt);
	if(fading){
		fadeT+=dt;
		if(fadeT<FADE){gAlpha=1-fadeT/FADE;PH.style.opacity=gAlpha;}
		else if(fadeT<FADE*2){if(fadeT-dt<FADE)resetToStart();gAlpha=(fadeT-FADE)/FADE;PH.style.opacity=gAlpha;}
		else{gAlpha=1;PH.style.opacity=1;fading=false;fadeT=0;}
		Object.values(PEERS).forEach(p=>{if(p.vis)p.ea+=.55*dt;});
		ageState(dt);
		return;
	}
	phT+=dt;
	const ph=PHASES[phIdx];
	if(ph.update)ph.update(dt);
	if(phT>=ph.dur){
		phT-=ph.dur;
		const next=(phIdx+1)%PHASES.length;
		if(next===0){fading=true;fadeT=0;}
		else{phIdx=next;setPhase(phIdx);if(PHASES[phIdx].enter)PHASES[phIdx].enter();}
	}
	Object.values(PEERS).forEach(p=>{
		if(!p.vis)return;
		p.x+=(p.tx-p.x)*Math.min(1,dt*4);
		p.ea+=(p.sp>.1?12:.55)*dt;
		p.sp=Math.max(0,p.sp-dt*1.6);p.fl=Math.max(0,p.fl-dt*2.2);
	});
	ageState(dt);
	blobs.forEach(b=>b.prog+=dt/b.dur);
	blobs=blobs.filter(b=>b.prog<=1.25);
	chunks.forEach(c=>{c.prog+=dt/c.dur;if(c.prog>=1&&!c.arrived){c.arrived=true;if(c.onArrive)c.onArrive();}});
	chunks=chunks.filter(c=>c.prog<=1.15);
	sparks.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=100*dt;s.life-=dt;});
	sparks=sparks.filter(s=>s.life>0);
}
function render(){
	X.clearRect(0,0,DESIGN_W,DESIGN_H);
	X.fillStyle='rgba(255,255,255,0.022)';
	for(let gx=20;gx<DESIGN_W;gx+=40)for(let gy=20;gy<DESIGN_H;gy+=40){X.beginPath();X.arc(gx,gy,1,0,Math.PI*2);X.fill();}
	X.save();X.globalAlpha=gAlpha;
	Object.values(PEERS).forEach(drawPeer);
	blobs.forEach(drawBlob);
	chunks.forEach(drawChunk);
	ticks.forEach(drawTick);
	sparks.forEach(s=>{X.save();X.globalAlpha=s.life*.8;X.beginPath();X.arc(s.x,s.y,2.2,0,Math.PI*2);X.fillStyle=s.col;X.fill();X.restore();});
	X.restore();
}
function loop(ts){
	const dt=lastT?Math.min((ts-lastT)/1000,.05):0;
	lastT=ts;update(dt);render();requestAnimationFrame(loop);
}
el('pause').onclick=()=>{paused=!paused;el('pause').textContent=paused?'play':'pause';};
el('restart').onclick=()=>{fading=false;gAlpha=1;PH.style.opacity=1;resetToStart();};
resetToStart();requestAnimationFrame(loop);
drawLegendIcons();window.addEventListener('resize',drawLegendIcons);
</script>
